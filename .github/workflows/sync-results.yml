name: Sync results

on:
  schedule:
    - cron: "15,45 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-results
        run: |
          code=$(curl -s -o /tmp/body.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SYNC_RESULTS_URL }}")
          echo "HTTP $code"; cat /tmp/body.json
          test "$code" = "200"
